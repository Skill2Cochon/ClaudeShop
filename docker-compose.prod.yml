# ClaudeShop — Production stack
# -----------------------------------------------------------------------------
# Usage (generic Docker host):
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Usage (Coolify): point a Docker-Compose resource at this file — Coolify
# injects secrets from its secret manager. Traefik labels already wired.
#
# Public hostnames are parameterised (DOMAIN_STOREFRONT, DOMAIN_ADMIN,
# DOMAIN_API) — see .env.production.example.
# -----------------------------------------------------------------------------

name: claudeshop

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '5'

services:
  # ============================================================
  # Application tier
  # ============================================================

  api:
    <<: *restart
    image: claudeshop/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: claudeshop-api
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_HOST: 0.0.0.0
      API_PORT: 3001
      API_PUBLIC_URL: https://${DOMAIN_API}
      STOREFRONT_URL: https://${DOMAIN_STOREFRONT}
      ADMIN_URL: https://${DOMAIN_ADMIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      AUTH_SECRET: ${AUTH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: claudeshop-api
    depends_on:
      postgres: { condition: service_healthy }
      pgbouncer: { condition: service_started }
      redis: { condition: service_healthy }
      meilisearch: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [backend, edge]
    <<: *logging
    labels:
      - traefik.enable=true
      - traefik.docker.network=claudeshop-edge
      - traefik.http.routers.claudeshop-api.rule=Host(`${DOMAIN_API}`)
      - traefik.http.routers.claudeshop-api.entrypoints=websecure
      - traefik.http.routers.claudeshop-api.tls.certresolver=letsencrypt
      - traefik.http.services.claudeshop-api.loadbalancer.server.port=3001

  worker:
    <<: *restart
    image: claudeshop/api:${IMAGE_TAG:-latest}
    container_name: claudeshop-worker
    command: ['sh', '-c', 'node --enable-source-maps apps/api/dist/worker.js']
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: claudeshop-worker
    depends_on:
      api: { condition: service_healthy }
    networks: [backend]
    <<: *logging

  admin:
    <<: *restart
    image: claudeshop/admin:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: claudeshop-admin
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
      API_INTERNAL_URL: http://api:3001
      AUTH_URL: https://${DOMAIN_ADMIN}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: 'true'
    depends_on:
      api: { condition: service_healthy }
    networks: [edge, backend]
    <<: *logging
    labels:
      - traefik.enable=true
      - traefik.docker.network=claudeshop-edge
      - traefik.http.routers.claudeshop-admin.rule=Host(`${DOMAIN_ADMIN}`)
      - traefik.http.routers.claudeshop-admin.entrypoints=websecure
      - traefik.http.routers.claudeshop-admin.tls.certresolver=letsencrypt
      - traefik.http.services.claudeshop-admin.loadbalancer.server.port=3002

  storefront:
    <<: *restart
    image: claudeshop/storefront:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    container_name: claudeshop-storefront
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
      API_INTERNAL_URL: http://api:3001
      STOREFRONT_URL: https://${DOMAIN_STOREFRONT}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      api: { condition: service_healthy }
    networks: [edge, backend]
    <<: *logging
    labels:
      - traefik.enable=true
      - traefik.docker.network=claudeshop-edge
      - traefik.http.routers.claudeshop-storefront.rule=Host(`${DOMAIN_STOREFRONT}`)
      - traefik.http.routers.claudeshop-storefront.entrypoints=websecure
      - traefik.http.routers.claudeshop-storefront.tls.certresolver=letsencrypt
      - traefik.http.services.claudeshop-storefront.loadbalancer.server.port=3000

  # ============================================================
  # Data tier
  # ============================================================

  postgres:
    <<: *restart
    image: pgvector/pgvector:pg16
    container_name: claudeshop-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - log_min_duration_statement=500
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [backend]
    <<: *logging

  pgbouncer:
    <<: *restart
    image: edoburu/pgbouncer:latest
    container_name: claudeshop-pgbouncer
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres: { condition: service_healthy }
    networks: [backend]
    <<: *logging

  redis:
    <<: *restart
    image: redis:7-alpine
    container_name: claudeshop-redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - 'yes'
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [backend]
    <<: *logging

  meilisearch:
    <<: *restart
    image: getmeili/meilisearch:v1.11
    container_name: claudeshop-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: production
      MEILI_LOG_LEVEL: INFO
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [backend]
    <<: *logging

  minio:
    <<: *restart
    image: minio/minio:latest
    container_name: claudeshop-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ':9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]
    <<: *logging

  minio-init:
    image: minio/mc:latest
    container_name: claudeshop-minio-init
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      mc anonymous set download local/${MINIO_BUCKET} &&
      echo 'Bucket ${MINIO_BUCKET} ready';
      exit 0;
      "
    networks: [backend]

volumes:
  postgres-data:
    name: claudeshop-postgres-data-prod
  redis-data:
    name: claudeshop-redis-data-prod
  meilisearch-data:
    name: claudeshop-meilisearch-data-prod
  minio-data:
    name: claudeshop-minio-data-prod

networks:
  backend:
    name: claudeshop-backend
    internal: true  # no internet from data-tier containers
  edge:
    name: claudeshop-edge
    # `edge` is the network Traefik attaches to. On Coolify this is the
    # `coolify` external network — override via:
    #   networks:
    #     edge:
    #       external: true
    #       name: coolify

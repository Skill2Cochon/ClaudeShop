# ClaudeShop — Local Dev Infrastructure
# Run: pnpm docker:up
# Reset: pnpm docker:reset (destroys volumes)

services:
  # ----- PostgreSQL 16 + pgvector -----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claudeshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: claudeshop
      POSTGRES_PASSWORD: claudeshop
      POSTGRES_DB: claudeshop
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U claudeshop -d claudeshop']
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=500

  # ----- PgBouncer (connection pooler) -----
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: claudeshop-pgbouncer
    restart: unless-stopped
    environment:
      DB_USER: claudeshop
      DB_PASSWORD: claudeshop
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: claudeshop
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      AUTH_TYPE: scram-sha-256
    ports:
      - '6432:5432'
    depends_on:
      postgres:
        condition: service_healthy

  # ----- Redis 7 -----
  redis:
    image: redis:7-alpine
    container_name: claudeshop-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ----- Meilisearch -----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: claudeshop-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: devMasterKeyChangeInProd
      MEILI_ENV: development
      MEILI_LOG_LEVEL: INFO
    ports:
      - '7700:7700'
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 5

  # ----- MinIO (S3-compatible object storage) -----
  minio:
    image: minio/minio:latest
    container_name: claudeshop-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: claudeshop
      MINIO_ROOT_PASSWORD: claudeshop
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ----- Mailhog (SMTP sink for dev emails) -----
  mailhog:
    image: mailhog/mailhog:latest
    container_name: claudeshop-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI

  # ----- Create MinIO bucket on first run -----
  minio-init:
    image: minio/mc:latest
    container_name: claudeshop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 claudeshop claudeshop &&
      mc mb --ignore-existing local/claudeshop-media &&
      mc anonymous set download local/claudeshop-media &&
      echo 'Bucket claudeshop-media ready';
      exit 0;
      "

volumes:
  postgres-data:
    name: claudeshop-postgres-data
  redis-data:
    name: claudeshop-redis-data
  meilisearch-data:
    name: claudeshop-meilisearch-data
  minio-data:
    name: claudeshop-minio-data

networks:
  default:
    name: claudeshop-net

packages:
  - 'apps/*'
  - 'packages/*'
  - 'modules/*'

catalog:
  # Runtime
  typescript: ^5.6.3
  '@types/node': ^22.10.0
  zod: ^3.23.8

  # Backend
  fastify: ^5.1.0
  '@fastify/cors': ^10.0.1
  '@fastify/helmet': ^12.0.1
  '@fastify/rate-limit': ^10.2.1
  '@fastify/sensible': ^6.0.1
  '@fastify/swagger': ^9.4.0
  '@fastify/under-pressure': ^9.0.1
  pino: ^9.5.0
  pino-pretty: ^13.0.0
  prisma: ^6.0.0
  '@prisma/client': ^6.0.0

  # Frontend
  next: ^16.0.0
  react: ^19.0.0
  react-dom: ^19.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0

  # UI
  tailwindcss: ^3.4.15
  autoprefixer: ^10.4.20
  postcss: ^8.4.49

  # Testing
  vitest: ^2.1.6
  '@vitest/coverage-v8': ^2.1.6
  '@playwright/test': ^1.49.0

  # Linting
  eslint: ^9.15.0
  '@eslint/js': ^9.15.0
  'typescript-eslint': ^8.15.0

onlyBuiltDependencies:
  - '@prisma/client'
  - 'prisma'
  - 'esbuild'
  - 'sharp'
